<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" fill="none">
  <defs>
    <radialGradient id="ag1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff313" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fff313" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Central glow -->
  <circle cx="300" cy="200" r="140" fill="url(#ag1)"/>

  <!-- Neural network connections - outer ring -->
  <line x1="300" y1="60" x2="420" y2="110" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="420" y1="110" x2="460" y2="200" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="460" y1="200" x2="420" y2="290" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="420" y1="290" x2="300" y2="340" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="300" y1="340" x2="180" y2="290" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="180" y1="290" x2="140" y2="200" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="140" y1="200" x2="180" y2="110" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="180" y1="110" x2="300" y2="60" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Cross connections - highlighted -->
  <line x1="300" y1="60" x2="300" y2="200" stroke="#fff313" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="140" y1="200" x2="300" y2="200" stroke="#fff313" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="460" y1="200" x2="300" y2="200" stroke="#fff313" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="300" y1="340" x2="300" y2="200" stroke="#fff313" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Diagonal cross connections -->
  <line x1="180" y1="110" x2="420" y2="290" stroke="#2a2a2a" stroke-width="0.5" stroke-opacity="0.6"/>
  <line x1="420" y1="110" x2="180" y2="290" stroke="#2a2a2a" stroke-width="0.5" stroke-opacity="0.6"/>

  <!-- Inner ring connections -->
  <line x1="300" y1="200" x2="340" y2="150" stroke="#fff313" stroke-width="0.6" stroke-opacity="0.4"/>
  <line x1="300" y1="200" x2="360" y2="200" stroke="#fff313" stroke-width="0.6" stroke-opacity="0.4"/>
  <line x1="300" y1="200" x2="340" y2="250" stroke="#fff313" stroke-width="0.6" stroke-opacity="0.4"/>
  <line x1="300" y1="200" x2="260" y2="250" stroke="#fff313" stroke-width="0.6" stroke-opacity="0.4"/>
  <line x1="300" y1="200" x2="240" y2="200" stroke="#fff313" stroke-width="0.6" stroke-opacity="0.4"/>
  <line x1="300" y1="200" x2="260" y2="150" stroke="#fff313" stroke-width="0.6" stroke-opacity="0.4"/>

  <!-- Secondary connections to mid nodes -->
  <line x1="340" y1="150" x2="420" y2="110" stroke="#f5f1e8" stroke-width="0.5" stroke-opacity="0.2"/>
  <line x1="360" y1="200" x2="460" y2="200" stroke="#f5f1e8" stroke-width="0.5" stroke-opacity="0.2"/>
  <line x1="340" y1="250" x2="420" y2="290" stroke="#f5f1e8" stroke-width="0.5" stroke-opacity="0.2"/>
  <line x1="260" y1="250" x2="180" y2="290" stroke="#f5f1e8" stroke-width="0.5" stroke-opacity="0.2"/>
  <line x1="240" y1="200" x2="140" y2="200" stroke="#f5f1e8" stroke-width="0.5" stroke-opacity="0.2"/>
  <line x1="260" y1="150" x2="180" y2="110" stroke="#f5f1e8" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- More scattered connections -->
  <line x1="180" y1="110" x2="360" y2="200" stroke="#2a2a2a" stroke-width="0.3"/>
  <line x1="420" y1="110" x2="260" y2="250" stroke="#2a2a2a" stroke-width="0.3"/>
  <line x1="420" y1="290" x2="240" y2="200" stroke="#2a2a2a" stroke-width="0.3"/>
  <line x1="180" y1="290" x2="340" y2="150" stroke="#2a2a2a" stroke-width="0.3"/>

  <!-- Outer nodes -->
  <circle cx="300" cy="60" r="5" fill="#0a0a0a" stroke="#f5f1e8" stroke-width="1.5"/>
  <circle cx="420" cy="110" r="5" fill="#0a0a0a" stroke="#f5f1e8" stroke-width="1.5"/>
  <circle cx="460" cy="200" r="5" fill="#0a0a0a" stroke="#f5f1e8" stroke-width="1.5"/>
  <circle cx="420" cy="290" r="5" fill="#0a0a0a" stroke="#f5f1e8" stroke-width="1.5"/>
  <circle cx="300" cy="340" r="5" fill="#0a0a0a" stroke="#f5f1e8" stroke-width="1.5"/>
  <circle cx="180" cy="290" r="5" fill="#0a0a0a" stroke="#f5f1e8" stroke-width="1.5"/>
  <circle cx="140" cy="200" r="5" fill="#0a0a0a" stroke="#f5f1e8" stroke-width="1.5"/>
  <circle cx="180" cy="110" r="5" fill="#0a0a0a" stroke="#f5f1e8" stroke-width="1.5"/>

  <!-- Inner mid-layer nodes -->
  <circle cx="340" cy="150" r="3.5" fill="#0a0a0a" stroke="#fff313" stroke-width="1"/>
  <circle cx="360" cy="200" r="3.5" fill="#0a0a0a" stroke="#fff313" stroke-width="1"/>
  <circle cx="340" cy="250" r="3.5" fill="#0a0a0a" stroke="#fff313" stroke-width="1"/>
  <circle cx="260" cy="250" r="3.5" fill="#0a0a0a" stroke="#fff313" stroke-width="1"/>
  <circle cx="240" cy="200" r="3.5" fill="#0a0a0a" stroke="#fff313" stroke-width="1"/>
  <circle cx="260" cy="150" r="3.5" fill="#0a0a0a" stroke="#fff313" stroke-width="1"/>

  <!-- Central node - primary -->
  <circle cx="300" cy="200" r="8" fill="#0a0a0a" stroke="#fff313" stroke-width="2"/>
  <circle cx="300" cy="200" r="3" fill="#fff313"/>

  <!-- Floating satellite nodes -->
  <circle cx="80" cy="80" r="2" fill="#f5f1e8" fill-opacity="0.2"/>
  <line x1="80" y1="80" x2="180" y2="110" stroke="#f5f1e8" stroke-width="0.3" stroke-opacity="0.15" stroke-dasharray="3 5"/>

  <circle cx="520" cy="80" r="2" fill="#f5f1e8" fill-opacity="0.2"/>
  <line x1="520" y1="80" x2="420" y2="110" stroke="#f5f1e8" stroke-width="0.3" stroke-opacity="0.15" stroke-dasharray="3 5"/>

  <circle cx="540" cy="320" r="2" fill="#f5f1e8" fill-opacity="0.2"/>
  <line x1="540" y1="320" x2="420" y2="290" stroke="#f5f1e8" stroke-width="0.3" stroke-opacity="0.15" stroke-dasharray="3 5"/>

  <circle cx="60" cy="320" r="2" fill="#f5f1e8" fill-opacity="0.2"/>
  <line x1="60" y1="320" x2="180" y2="290" stroke="#f5f1e8" stroke-width="0.3" stroke-opacity="0.15" stroke-dasharray="3 5"/>

  <!-- Pulse rings around center -->
  <circle cx="300" cy="200" r="30" stroke="#fff313" stroke-width="0.5" stroke-opacity="0.15"/>
  <circle cx="300" cy="200" r="55" stroke="#fff313" stroke-width="0.3" stroke-opacity="0.1"/>
  <circle cx="300" cy="200" r="85" stroke="#f5f1e8" stroke-width="0.3" stroke-opacity="0.06"/>

  <!-- Data flow dots along connections -->
  <circle cx="350" cy="85" r="1.5" fill="#fff313" fill-opacity="0.6"/>
  <circle cx="440" cy="155" r="1.5" fill="#fff313" fill-opacity="0.4"/>
  <circle cx="240" cy="315" r="1.5" fill="#fff313" fill-opacity="0.4"/>
  <circle cx="160" cy="155" r="1.5" fill="#fff313" fill-opacity="0.6"/>
</svg>