<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" fill="none">
  <defs>
    <linearGradient id="gvg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff313" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#fff313" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Gavel head - geometric rectangle, rotated -->
  <g transform="rotate(-35 300 160)">
    <rect x="240" y="140" width="120" height="40" rx="4" stroke="#f5f1e8" stroke-width="1.5" fill="none" fill-opacity="0"/>
    <!-- Inner detail lines -->
    <line x1="255" y1="148" x2="255" y2="172" stroke="#fff313" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="345" y1="148" x2="345" y2="172" stroke="#fff313" stroke-width="1" stroke-opacity="0.5"/>
    <!-- Gavel face highlights -->
    <rect x="248" y="148" width="14" height="24" rx="2" fill="#2a2a2a" fill-opacity="0.5"/>
    <rect x="338" y="148" width="14" height="24" rx="2" fill="#2a2a2a" fill-opacity="0.5"/>
  </g>

  <!-- Gavel handle -->
  <line x1="300" y1="180" x2="340" y2="280" stroke="#f5f1e8" stroke-width="2" stroke-linecap="round" stroke-opacity="0.7"/>

  <!-- Handle grip lines -->
  <line x1="318" y1="228" x2="326" y2="222" stroke="#2a2a2a" stroke-width="0.8"/>
  <line x1="322" y1="240" x2="330" y2="234" stroke="#2a2a2a" stroke-width="0.8"/>
  <line x1="326" y1="252" x2="334" y2="246" stroke="#2a2a2a" stroke-width="0.8"/>

  <!-- Sound block / strike pad -->
  <rect x="200" y="300" width="200" height="14" rx="3" stroke="#f5f1e8" stroke-width="1.2" fill="none" stroke-opacity="0.5"/>
  <rect x="220" y="304" width="160" height="6" rx="2" fill="#2a2a2a" fill-opacity="0.4"/>

  <!-- Base platform -->
  <rect x="180" y="320" width="240" height="6" rx="2" fill="#f5f1e8" fill-opacity="0.15"/>

  <!-- Impact point -->
  <circle cx="330" cy="300" r="4" fill="#fff313" fill-opacity="0.7"/>

  <!-- Impact ripple rings -->
  <circle cx="330" cy="300" r="15" stroke="#fff313" stroke-width="0.8" fill="none" stroke-opacity="0.4"/>
  <circle cx="330" cy="300" r="30" stroke="#fff313" stroke-width="0.5" fill="none" stroke-opacity="0.2"/>
  <circle cx="330" cy="300" r="50" stroke="#fff313" stroke-width="0.3" fill="none" stroke-opacity="0.1"/>

  <!-- Impact lines radiating -->
  <line x1="330" y1="280" x2="330" y2="265" stroke="#fff313" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="350" y1="285" x2="365" y2="275" stroke="#fff313" stroke-width="0.5" stroke-opacity="0.25"/>
  <line x1="355" y1="300" x2="375" y2="300" stroke="#fff313" stroke-width="0.5" stroke-opacity="0.2"/>
  <line x1="310" y1="285" x2="295" y2="275" stroke="#fff313" stroke-width="0.5" stroke-opacity="0.25"/>
  <line x1="305" y1="300" x2="285" y2="300" stroke="#fff313" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Decision flow lines - left side -->
  <polyline points="80,120 120,120 130,130 160,130" stroke="#2a2a2a" stroke-width="0.8" fill="none"/>
  <polyline points="80,150 110,150 120,140 155,140" stroke="#2a2a2a" stroke-width="0.8" fill="none"/>
  <polyline points="80,180 115,180 125,170 160,170" stroke="#2a2a2a" stroke-width="0.8" fill="none"/>
  <circle cx="80" cy="120" r="2" fill="#f5f1e8" fill-opacity="0.3"/>
  <circle cx="80" cy="150" r="2" fill="#f5f1e8" fill-opacity="0.3"/>
  <circle cx="80" cy="180" r="2" fill="#f5f1e8" fill-opacity="0.3"/>

  <!-- Converging to decision point -->
  <line x1="160" y1="130" x2="200" y2="160" stroke="#2a2a2a" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="155" y1="140" x2="200" y2="160" stroke="#2a2a2a" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="160" y1="170" x2="200" y2="160" stroke="#2a2a2a" stroke-width="0.5" stroke-dasharray="3 3"/>
  <circle cx="200" cy="160" r="3" fill="#fff313" fill-opacity="0.5"/>

  <!-- Decision flow lines - right side (output) -->
  <polyline points="440,130 470,130 480,120 520,120" stroke="#2a2a2a" stroke-width="0.8" fill="none"/>
  <polyline points="440,160 465,160 475,170 520,170" stroke="#2a2a2a" stroke-width="0.8" fill="none"/>
  <circle cx="520" cy="120" r="2" fill="#fff313" fill-opacity="0.4"/>
  <circle cx="520" cy="170" r="2" fill="#fff313" fill-opacity="0.4"/>

  <!-- Connection from gavel to output -->
  <line x1="380" y1="160" x2="440" y2="130" stroke="#2a2a2a" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="380" y1="160" x2="440" y2="160" stroke="#2a2a2a" stroke-width="0.5" stroke-dasharray="3 3"/>
  <circle cx="380" cy="160" r="3" fill="#fff313" fill-opacity="0.5"/>

  <!-- Abstract verdict / checkmark -->
  <polyline points="490,210 505,225 535,195" stroke="#fff313" stroke-width="1.5" fill="none" stroke-opacity="0.5" stroke-linecap="round"/>

  <!-- Decorative geometric accents -->
  <rect x="70" y="80" width="6" height="6" transform="rotate(45 73 83)" stroke="#f5f1e8" stroke-width="0.5" fill="none" stroke-opacity="0.2"/>
  <rect x="520" cy="80" width="6" height="6" transform="rotate(45 523 83)" stroke="#f5f1e8" stroke-width="0.5" fill="none" stroke-opacity="0.2"/>

  <!-- Subtle paragraph/law lines -->
  <line x1="100" y1="340" x2="160" y2="340" stroke="#2a2a2a" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="100" y1="348" x2="145" y2="348" stroke="#2a2a2a" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="100" y1="356" x2="155" y2="356" stroke="#2a2a2a" stroke-width="0.5" stroke-opacity="0.2"/>

  <line x1="440" y1="340" x2="500" y2="340" stroke="#2a2a2a" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="440" y1="348" x2="490" y2="348" stroke="#2a2a2a" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="440" y1="356" x2="495" y2="356" stroke="#2a2a2a" stroke-width="0.5" stroke-opacity="0.2"/>
</svg>