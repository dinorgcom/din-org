<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" fill="none">
  <defs>
    <linearGradient id="sg1" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fff313" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#fff313" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="shieldClip">
      <path d="M300 60 L420 110 L420 240 Q420 310 300 360 Q180 310 180 240 L180 110 Z"/>
    </clipPath>
  </defs>

  <!-- Shield outer shape -->
  <path d="M300 60 L420 110 L420 240 Q420 310 300 360 Q180 310 180 240 L180 110 Z"
        stroke="#f5f1e8" stroke-width="1.5" fill="url(#sg1)"/>

  <!-- Shield inner outline -->
  <path d="M300 85 L400 125 L400 235 Q400 295 300 338 Q200 295 200 235 L200 125 Z"
        stroke="#2a2a2a" stroke-width="1" fill="none"/>

  <!-- Encryption grid pattern inside shield -->
  <g clip-path="url(#shieldClip)" opacity="0.35">
    <!-- Horizontal lines -->
    <line x1="180" y1="130" x2="420" y2="130" stroke="#2a2a2a" stroke-width="0.5"/>
    <line x1="180" y1="160" x2="420" y2="160" stroke="#2a2a2a" stroke-width="0.5"/>
    <line x1="180" y1="190" x2="420" y2="190" stroke="#2a2a2a" stroke-width="0.5"/>
    <line x1="180" y1="220" x2="420" y2="220" stroke="#2a2a2a" stroke-width="0.5"/>
    <line x1="180" y1="250" x2="420" y2="250" stroke="#2a2a2a" stroke-width="0.5"/>
    <line x1="180" y1="280" x2="420" y2="280" stroke="#2a2a2a" stroke-width="0.5"/>
    <line x1="180" y1="310" x2="420" y2="310" stroke="#2a2a2a" stroke-width="0.5"/>
    <!-- Vertical lines -->
    <line x1="220" y1="60" x2="220" y2="360" stroke="#2a2a2a" stroke-width="0.5"/>
    <line x1="260" y1="60" x2="260" y2="360" stroke="#2a2a2a" stroke-width="0.5"/>
    <line x1="300" y1="60" x2="300" y2="360" stroke="#2a2a2a" stroke-width="0.5"/>
    <line x1="340" y1="60" x2="340" y2="360" stroke="#2a2a2a" stroke-width="0.5"/>
    <line x1="380" y1="60" x2="380" y2="360" stroke="#2a2a2a" stroke-width="0.5"/>
  </g>

  <!-- Central lock / keyhole abstract -->
  <circle cx="300" cy="195" r="22" stroke="#fff313" stroke-width="1.5" fill="none"/>
  <circle cx="300" cy="195" r="16" stroke="#fff313" stroke-width="0.5" fill="none" stroke-opacity="0.4"/>
  <circle cx="300" cy="190" r="6" fill="#fff313" fill-opacity="0.8"/>
  <rect x="297" y="196" width="6" height="18" rx="2" fill="#fff313" fill-opacity="0.6"/>

  <!-- Checkmark / verification inside top -->
  <polyline points="280,170 295,182 320,155" stroke="#fff313" stroke-width="0" fill="none" stroke-opacity="0"/>

  <!-- Decorative circuit traces from shield edges -->
  <polyline points="420,150 450,150 460,140 500,140" stroke="#2a2a2a" stroke-width="0.8" fill="none"/>
  <circle cx="500" cy="140" r="2" fill="#fff313" fill-opacity="0.4"/>

  <polyline points="420,200 455,200 465,210 510,210" stroke="#2a2a2a" stroke-width="0.8" fill="none"/>
  <circle cx="510" cy="210" r="2" fill="#fff313" fill-opacity="0.3"/>

  <polyline points="420,250 445,250 455,260 490,260" stroke="#2a2a2a" stroke-width="0.8" fill="none"/>
  <circle cx="490" cy="260" r="2" fill="#fff313" fill-opacity="0.3"/>

  <polyline points="180,150 150,150 140,140 100,140" stroke="#2a2a2a" stroke-width="0.8" fill="none"/>
  <circle cx="100" cy="140" r="2" fill="#fff313" fill-opacity="0.4"/>

  <polyline points="180,200 145,200 135,210 90,210" stroke="#2a2a2a" stroke-width="0.8" fill="none"/>
  <circle cx="90" cy="210" r="2" fill="#fff313" fill-opacity="0.3"/>

  <polyline points="180,250 155,250 145,260 110,260" stroke="#2a2a2a" stroke-width="0.8" fill="none"/>
  <circle cx="110" cy="260" r="2" fill="#fff313" fill-opacity="0.3"/>

  <!-- Binary/data fragments -->
  <text x="460" y="175" font-family="monospace" font-size="8" fill="#2a2a2a" fill-opacity="0.5">1 0 1</text>
  <text x="450" y="235" font-family="monospace" font-size="8" fill="#2a2a2a" fill-opacity="0.4">0 1 0</text>
  <text x="100" y="175" font-family="monospace" font-size="8" fill="#2a2a2a" fill-opacity="0.5">0 1 1</text>
  <text x="110" y="235" font-family="monospace" font-size="8" fill="#2a2a2a" fill-opacity="0.4">1 0 0</text>

  <!-- Corner accents -->
  <polyline points="60,70 60,60 70,60" stroke="#f5f1e8" stroke-width="0.8" fill="none" stroke-opacity="0.2"/>
  <polyline points="530,70 530,60 540,60" stroke="#f5f1e8" stroke-width="0.8" fill="none" stroke-opacity="0.2"/>
  <polyline points="60,340 60,350 70,350" stroke="#f5f1e8" stroke-width="0.8" fill="none" stroke-opacity="0.2"/>
  <polyline points="530,340 530,350 540,350" stroke="#f5f1e8" stroke-width="0.8" fill="none" stroke-opacity="0.2"/>

  <!-- Subtle concentric protection rings -->
  <ellipse cx="300" cy="210" rx="160" ry="120" stroke="#f5f1e8" stroke-width="0.3" fill="none" stroke-opacity="0.06" stroke-dasharray="6 8"/>
  <ellipse cx="300" cy="210" rx="190" ry="145" stroke="#f5f1e8" stroke-width="0.3" fill="none" stroke-opacity="0.04" stroke-dasharray="4 10"/>
</svg>