<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" fill="none">
  <defs>
    <linearGradient id="spg1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff313" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fff313" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="spg2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5f1e8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#f5f1e8" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Deconstructed clock - outer arc -->
  <path d="M380 200 A80 80 0 1 0 300 120" stroke="#f5f1e8" stroke-width="1.5" fill="none" stroke-opacity="0.5"/>

  <!-- Clock partial arcs -->
  <path d="M300 120 A80 80 0 0 1 370 160" stroke="#fff313" stroke-width="2" fill="none" stroke-opacity="0.8"/>

  <!-- Clock tick marks -->
  <line x1="300" y1="118" x2="300" y2="128" stroke="#f5f1e8" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="380" y1="198" x2="370" y2="198" stroke="#f5f1e8" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="300" y1="282" x2="300" y2="272" stroke="#f5f1e8" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="220" y1="198" x2="230" y2="198" stroke="#f5f1e8" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Smaller ticks -->
  <line x1="340" y1="126" x2="336" y2="134" stroke="#f5f1e8" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="372" y1="160" x2="364" y2="164" stroke="#f5f1e8" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="372" y1="240" x2="364" y2="236" stroke="#f5f1e8" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="340" y1="274" x2="336" y2="266" stroke="#f5f1e8" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="260" y1="274" x2="264" y2="266" stroke="#f5f1e8" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="228" y1="240" x2="236" y2="236" stroke="#f5f1e8" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="228" y1="160" x2="236" y2="164" stroke="#f5f1e8" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="260" y1="126" x2="264" y2="134" stroke="#f5f1e8" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Clock center -->
  <circle cx="300" cy="200" r="3" fill="#fff313"/>

  <!-- Clock hand - fast, pointing to ~1 o'clock -->
  <line x1="300" y1="200" x2="345" y2="150" stroke="#fff313" stroke-width="2" stroke-linecap="round"/>

  <!-- Speed lines - horizontal streaks -->
  <line x1="60" y1="140" x2="190" y2="140" stroke="url(#spg1)" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="165" x2="175" y2="165" stroke="url(#spg2)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="80" y1="190" x2="195" y2="190" stroke="url(#spg1)" stroke-width="1" stroke-linecap="round"/>

  <line x1="70" y1="215" x2="190" y2="215" stroke="url(#spg2)" stroke-width="1" stroke-linecap="round"/>
  <line x1="50" y1="240" x2="180" y2="240" stroke="url(#spg1)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="90" y1="265" x2="185" y2="265" stroke="url(#spg2)" stroke-width="1" stroke-linecap="round"/>

  <!-- Motion particles -->
  <circle cx="200" cy="140" r="2" fill="#fff313" fill-opacity="0.7"/>
  <circle cx="185" cy="165" r="1.5" fill="#f5f1e8" fill-opacity="0.4"/>
  <circle cx="205" cy="190" r="1.5" fill="#fff313" fill-opacity="0.5"/>
  <circle cx="200" cy="215" r="1" fill="#f5f1e8" fill-opacity="0.3"/>
  <circle cx="190" cy="240" r="2" fill="#fff313" fill-opacity="0.5"/>
  <circle cx="195" cy="265" r="1" fill="#f5f1e8" fill-opacity="0.3"/>

  <!-- Fragmented outer ring pieces suggesting explosion/speed -->
  <path d="M400 155 A110 110 0 0 1 410 200" stroke="#f5f1e8" stroke-width="0.8" fill="none" stroke-opacity="0.2"/>
  <path d="M415 220 A120 120 0 0 1 395 275" stroke="#f5f1e8" stroke-width="0.6" fill="none" stroke-opacity="0.15"/>

  <!-- Speed chevrons on right side -->
  <polyline points="430,185 445,200 430,215" stroke="#fff313" stroke-width="1" fill="none" stroke-opacity="0.4"/>
  <polyline points="455,185 470,200 455,215" stroke="#fff313" stroke-width="1" fill="none" stroke-opacity="0.3"/>
  <polyline points="480,185 495,200 480,215" stroke="#fff313" stroke-width="1" fill="none" stroke-opacity="0.2"/>

  <!-- Acceleration curve -->
  <path d="M300 330 Q400 320 480 280 Q530 260 560 220" stroke="#2a2a2a" stroke-width="1" fill="none" stroke-dasharray="4 4"/>
  <circle cx="560" cy="220" r="2" fill="#fff313" fill-opacity="0.4"/>

  <!-- Time fragments - small clock segments scattered -->
  <path d="M480 100 A15 15 0 0 1 495 115" stroke="#f5f1e8" stroke-width="0.8" fill="none" stroke-opacity="0.2"/>
  <path d="M110 310 A12 12 0 0 1 122 322" stroke="#f5f1e8" stroke-width="0.8" fill="none" stroke-opacity="0.15"/>

  <!-- Dotted trail -->
  <circle cx="150" cy="155" r="0.8" fill="#fff313" fill-opacity="0.3"/>
  <circle cx="135" cy="155" r="0.8" fill="#fff313" fill-opacity="0.2"/>
  <circle cx="120" cy="155" r="0.8" fill="#fff313" fill-opacity="0.1"/>

  <circle cx="145" cy="250" r="0.8" fill="#fff313" fill-opacity="0.3"/>
  <circle cx="130" cy="250" r="0.8" fill="#fff313" fill-opacity="0.2"/>
  <circle cx="115" cy="250" r="0.8" fill="#fff313" fill-opacity="0.1"/>
</svg>